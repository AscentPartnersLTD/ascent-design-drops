<title>Col du Fantasy - Draft</title>

<style>
  :root{--paper:#f6f3ea;--paper2:#efeadb;--card:#fffdf7;--ink:#1b1a17;--ink2:#4a463d;--mute:#928d81;--line:#e7e2d5;--line2:#d8d2c3;--gold:#e8b31e;--gold-d:#c9971a;--dark:#191813;--blue:#26347e;--green:#2f8f52;--red:#cf2530;--sh:0 1px 3px rgba(40,34,20,.07),0 8px 22px rgba(40,34,20,.06);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:800px;margin:0 auto;padding:0 0 60px}
  .topbar{background:var(--dark);color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative}
  .topbar::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--gold-d),var(--gold))}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:44px;height:44px;border-radius:11px;background:var(--gold);flex:none;display:flex;align-items:center;justify-content:center}
  .logo svg{width:28px;height:28px}
  .wm{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px;color:#fff}.wm span{color:var(--gold)}
  .tag{font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:9.5px;color:#b7b2a6;margin-top:4px}
  .who{font-size:11px;color:#b7b2a6;text-align:right;font-family:'Montserrat',sans-serif;font-weight:700}
  .who b{color:#fff;display:block;font-size:12px}
  .body{padding:22px}
  .signin{text-align:center;padding:40px 20px}
  .signin h2{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px}
  .gbtn{margin-top:14px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;color:#fff;background:var(--gold-d);border:none;border-radius:11px;padding:13px 26px;cursor:pointer}
  .msg{font-size:13px;color:var(--mute);margin-top:14px;min-height:18px}
  .msg.err{color:var(--red)}
  .draft{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh);padding:16px 18px}
  .dh{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .dh-l{display:flex;align-items:center;gap:10px}
  .dh-ico{width:30px;height:30px;border-radius:8px;background:var(--dark);display:flex;align-items:center;justify-content:center;flex:none}
  .dh-ico svg{width:19px;height:19px}
  .dh-t{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px}
  .dh-s{font-size:11.5px;color:var(--mute);margin-top:1px}
  .dh-badge{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;white-space:nowrap}
  .badge-clock{background:var(--gold-d);color:#fff}.badge-done{background:#e3f2e8;color:#256e3e}
  .badge-pending{background:#f0eee6;color:#7a7466;border:1px solid #e0dccd}
  .ticker{display:flex;gap:6px;margin:16px 0 4px;align-items:flex-start}
  .tnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .tgap{width:1px;align-self:stretch;background:var(--line);margin:6px 5px 16px}
  .tav{width:42px;height:42px;border-radius:50%;position:relative;flex:none;display:flex;align-items:center;justify-content:center}
  .tav .ph{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
  .tav .fb{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px}
  .tav.pending{border:2px dashed var(--line2)}.tav.pending .fb{background:transparent!important;color:var(--mute);font-size:11px}
  .tav.clock{box-shadow:0 0 0 3px rgba(201,151,26,.28)}
  .tcap{font-size:9px;color:var(--mute);font-family:'Montserrat',sans-serif;font-weight:700;text-align:center;line-height:1.35}
  .tcap b{display:block;font-size:11px}
  .tname{font-size:10px;color:var(--ink2);font-weight:600;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .action{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .a-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;margin-bottom:9px}
  .a-h small{display:block;font-weight:600;font-size:11.5px;color:var(--mute);margin-top:2px;letter-spacing:0;text-transform:none}
  .searchrow{display:flex;gap:9px;position:relative;flex-wrap:wrap}
  .searchrow input{flex:1 1 100%;font-size:15px;padding:12px 13px;border:1px solid var(--line2);border-radius:11px;background:var(--paper)}
  .searchrow input:focus{outline:none;border-color:var(--gold-d);background:#fff}
  .lockbtn{flex:1 1 100%;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:#fff;background:var(--gold-d);border:none;border-radius:11px;padding:12px 20px;cursor:pointer;white-space:nowrap}
  .lockbtn:disabled{background:var(--line2);cursor:not-allowed}
  .ac{position:absolute;left:0;right:0;top:52px;background:#fff;border:1px solid var(--line2);border-radius:11px;box-shadow:0 10px 28px rgba(40,34,20,.15);z-index:20;max-height:230px;overflow:auto;display:none}
  .ac.open{display:block}
  .ac-item{padding:8px 11px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
  .ac-item:first-child{border-top:none}.ac-item:hover{background:var(--paper)}
  .ac-av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none;background:var(--line2)}
  .ac-rn{font-weight:600;font-size:14px}.ac-rt{color:var(--mute);font-size:12px;margin-left:auto}
  .waitline{font-size:13.5px;color:var(--ink2)}.waitline b{color:var(--ink)}
  .pendline{font-size:13.5px;color:var(--ink2)}.pendline b{color:var(--ink)}
  .admin{background:#f4f6fb;border:1px solid #d6ddec;border-radius:12px;padding:13px 15px;margin-top:13px}
  .admin .ad-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#3a4a86}
  .admin .ad-b{font-size:12.5px;color:var(--ink2);margin:6px 0 10px}
  .judge{background:#fdf3dc;border:1px solid #edd489;border-radius:12px;padding:13px 15px;margin-top:13px}
  .judge .j-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8a6d16}
  .judge .j-b{font-size:13.5px;margin:7px 0 11px}.judge .j-b b{font-weight:800}
  .j-skip{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:#fff;background:var(--red);border:none;border-radius:10px;padding:10px 18px;cursor:pointer}
  .allin{text-align:center;padding:10px}.allin .big{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px;color:var(--green)}.allin .sm{color:var(--ink2);font-size:14px;margin-top:6px}
  .picker a{display:block;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-top:9px;text-decoration:none;color:var(--ink);font-weight:600;background:var(--card)}
  .picker a:hover{border-color:var(--gold-d)}
  .note{font-size:11px;color:var(--mute);margin:16px 22px 0;line-height:1.55;text-align:center}
  .seedbar{font-size:11px;color:var(--mute);text-align:center;margin-top:10px}
</style>
</head>

{"r": "N. Märkl", "t": "Team Picnic PostNL", "c": "#FF6900", "p": "https://img.aso.fr/core_app/img-cycling-tdf-png/216/71825/0:0,400:400-0-0-70/eca4d"},
{"r": "M. Le Berre", "t": "TotalEnergies", "c": "#F04E23", "p": "https://img.aso.fr/core_app/img-cycling-tdf-png/206/71815/0:0,400:400-0-0-70/b6f6e"}];
const init=r=>r.replace(/[^A-Za-z. ]/g,'').split(/[.\s]+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);
function boot(t){ $('boot').textContent=t||''; $('boot').style.display=t?'block':'none'; }

// live state
let me=null, myEmail=null, isOwner=false, poolId=null, pool=null, STAGE=null, ORDER=[], SNAKE=[], PMETA={}, JUDGE=null;
let myCode=null, isJudge=false, draft=null, unsub=null, chosen=null;

const paramPool=new URLSearchParams(location.search).get('pool');

auth.onAuthStateChanged(async user=>{
  if(!user){ $('signin').style.display='block'; $('app').style.display='none'; boot(''); $('whoami').innerHTML=''; return; }
  me=user; myEmail=(user.email||'').toLowerCase(); isOwner=(myEmail===OWNER_EMAIL);
  $('signin').style.display='none';
  $('whoami').innerHTML=`signed in<b>${esc(myEmail)}</b>`;
  boot('Finding your pool...');
  try{
    const id = await resolvePool();
    if(!id) return;               // resolvePool rendered its own message
    await loadPool(id);
    subscribe();
  }catch(e){ boot('Error: '+(e.message||e)); }
});

$('gbtn').addEventListener('click',()=>{
  const p=new firebase.auth.GoogleAuthProvider(); p.setCustomParameters({prompt:'select_account'});
  auth.signInWithPopup(p).catch(e=>{ $('signmsg').textContent=e.message; $('signmsg').className='msg err'; });
});

async function resolvePool(){
  if(paramPool) return paramPool;   // explicit link always wins
  // Auto-route: find the pool(s) this signed-in email belongs to.
  const mine=await db.collection('pools').where('memberEmails','array-contains',myEmail).get();
  if(mine.size===1) return mine.docs[0].id;
  if(mine.size>1){ pickFrom(mine, 'You are in more than one pool'); return null; }
  // Not a member of any pool. The operator can still pick from every pool.
  if(isOwner){
    const all=await db.collection('pools').get();
    if(all.size===0){ boot('No pools yet. Create one in the operator console.'); return null; }
    if(all.size===1) return all.docs[0].id;
    pickFrom(all, 'Operator - pick a pool'); return null;
  }
  $('app').style.display='block';
  $('draftCard').innerHTML='<div class="allin"><div class="sm">You are not in a pool yet. Ask Allen to add you, then sign in again.</div></div>';
  boot(''); return null;
}
function pickFrom(snap, title){
  let html='<div class="picker"><div class="a-h">'+esc(title)+'</div>';
  snap.forEach(d=>{ html+=`<a href="?pool=${encodeURIComponent(d.id)}">${esc(d.data().name||d.id)}</a>`; });
  html+='</div>';
  $('app').style.display='block'; $('draftCard').innerHTML=html; boot('');
}

async function loadPool(id){
  const snap=await db.doc('pools/'+id).get();
  if(!snap.exists) throw new Error('That pool does not exist.');
  poolId=id; pool=snap.data();
  STAGE=String(pool.startStage);
  ORDER=(pool.order&&pool.order.length)?pool.order.slice():Object.values(pool.members||{});
  SNAKE=ORDER.concat(ORDER.slice().reverse());
  JUDGE=pool.judge||null;
  PMETA={}; ORDER.forEach((code,i)=>{ PMETA[code]={n:code,c:PALETTE[i%PALETTE.length]}; });
  // map my email to my code
  const members=pool.members||{};
  myCode = members[myEmail] || null;
  isJudge = (myCode && myCode===JUDGE);
  $('poolTag').textContent=(pool.name||'Draft');
  document.title='Col du Fantasy - '+(pool.name||'Draft');
}

function draftRef(){ return db.doc('pools/'+poolId+'/drafts/'+STAGE); }

function draftInit(){
  return { n:Number(STAGE), order:ORDER, snake:SNAKE, queue:SNAKE.slice(), picks:[], status:'pending', createdAt:FV.serverTimestamp() };
}

function subscribe(){
  $('app').style.display='block'; boot('');
  if(unsub) unsub();
  unsub=draftRef().onSnapshot(async snap=>{
    if(!snap.exists){
      // seed a pending draft (any pool member or the operator may create it)
      if(isOwner || myCode){ try{ await draftRef().set(draftInit()); }catch(e){ $('draftCard').innerHTML=warn('Could not open the draft: '+esc(e.message)); } return; }
      $('draftCard').innerHTML='<div class="allin"><div class="sm">The draft has not been opened yet.</div></div>'; return;
    }
    draft=snap.data();
    // If the roster changed while the draft is still pending (no picks yet), re-sync
    // the draft to the new order so a late-added member is included cleanly.
    if(draft.status==='pending' && (draft.picks||[]).length===0 && JSON.stringify(draft.order||[])!==JSON.stringify(ORDER)){
      if(isOwner || myCode){ try{ await draftRef().set(draftInit()); }catch(e){} return; }
    }
    render();
  }, err=>{ $('draftCard').innerHTML=warn('Permission error: '+esc(err.message)+'. Are you a member of this pool?'); });
}
function warn(t){ return '<div class="allin"><div class="sm" style="color:var(--red)">'+t+'</div></div>'; }

function head(sub,badge){
  return `<div class="dh"><div class="dh-l"><div class="dh-ico"><svg viewBox="0 0 40 40" fill="none"><path d="M4 31 L15 13 L21 22 L27 9 L36 31 Z" fill="#e8b31e"/><circle cx="27" cy="9" r="3.2" fill="#e8b31e"/></svg></div>
    <div><div class="dh-t">Stage ${esc(STAGE)} draft</div><div class="dh-s">${sub}</div></div></div>${badge||''}</div>`;
}
function riderAv(rider,pending,clock,player){
  if(pending) return `<span class="tav pending ${clock?'clock':''}"><span class="fb" style="color:${PMETA[player].c}">${player}</span></span>`;
  const col=rider.c||'#888';
  const fb=`<span class="fb" style="background:${col}">${init(rider.r)}</span>`;
  const img=rider.p?`<img class="ph" src="${esc(rider.p)}" onerror="this.remove()">`:'';
  return `<span class="tav" style="box-shadow:0 0 0 2.5px ${col}">${fb}${img}</span>`;
}
function render(){
  const picks=draft.picks||[], queue=draft.queue||[];
  const clockCode=queue[0]||null;
  const status=draft.status||'pending';
  const done=status==='complete'||queue.length===0;
  const pending=status==='pending'&&picks.length===0;
  const leadoff=ORDER[0];

  let nodes='';
  for(let i=0;i<SNAKE.length;i++){
    if(i===ORDER.length) nodes+='<div class="tgap"></div>';
    if(i<picks.length){
      const pk=picks[i];
      nodes+=`<div class="tnode">${riderAv({r:pk.rider,t:pk.team,c:pk.color||'#888',p:pk.photo},false)}<div class="tcap"><b style="color:${PMETA[pk.player].c}">#${i+1}</b>${pk.player}</div><div class="tname">${esc(pk.rider)}</div></div>`;
    } else {
      const qi=i-picks.length, player=queue[qi], clk=(qi===0&&!pending);
      nodes+=`<div class="tnode">${riderAv(null,true,clk,player)}<div class="tcap"><b style="color:${PMETA[player].c}">#${i+1}</b>${player}</div></div>`;
    }
  }

  let badge;
  if(pending) badge='<span class="dh-badge badge-pending">Not started</span>';
  else if(done) badge=`<span class="dh-badge badge-done">All ${picks.length} in</span>`;
  else badge=`<span class="dh-badge badge-clock">${PMETA[clockCode].n} on the clock</span>`;

  const sub = pending ? `Snake draft &middot; opens on ${PMETA[leadoff].n}'s first pick` : (done?'Snake draft &middot; complete':'Snake draft &middot; live');
  let action='';
  if(done){
    action=`<div class="action"><div class="allin"><div class="big">All picks are in.</div><div class="sm">Standings post once the stage is scored.</div></div></div>`;
  } else if(pending){
    if(clockCode===myCode){
      action=`<div class="action"><div class="a-h">You lead off &middot; pick #1<small>Locking your first rider opens the draft for everyone.</small></div>${searchRow('Launch the draft')}</div>`;
    } else {
      action=`<div class="action"><div class="pendline"><b>The draft opens when ${PMETA[leadoff].n} makes the first pick.</b> Your turn will show here the moment it is live.</div></div>`;
    }
  } else if(clockCode===myCode){
    action=`<div class="action"><div class="a-h">You are on the clock &middot; pick #${picks.length+1}</div>${searchRow('Lock pick')}</div>`;
  } else {
    const mine=[]; queue.forEach((c,idx)=>{ if(c===myCode) mine.push(idx); });
    const nextTxt = myCode ? (mine.length?`Your next turn is pick #${picks.length+mine[0]+1}.`:`Both your picks are in.`) : `You are watching.`;
    action=`<div class="action"><div class="waitline"><b>${PMETA[clockCode].n} is on the clock.</b> ${nextTxt}</div></div>`;
  }

  // operator admin entry (only the platform operator, not ordinary members)
  let admin='';
  if(isOwner && !pending && clockCode && clockCode!==myCode){
    admin=`<div class="admin"><div class="ad-h">Operator &middot; enter for the player on the clock</div>
      <div class="ad-b">${PMETA[clockCode].n} is up (pick #${picks.length+1}). You can lock their rider for them.</div>${searchRow('Enter for '+PMETA[clockCode].n)}</div>`;
  }
  // judge bump
  let judge='';
  if(isJudge && !pending && clockCode && clockCode!==myCode){
    judge=`<div class="judge"><div class="j-h">Judge control</div><div class="j-b">Waiting on <b>${PMETA[clockCode].n}</b> (pick #${picks.length+1}). Bump them to the back of the order?</div><button class="j-skip" id="bump" type="button">Bump ${PMETA[clockCode].n} to the back</button></div>`;
  }

  $('draftCard').innerHTML='<div class="draft" style="border:none;box-shadow:none;padding:0">'+head(sub,badge)+`<div class="ticker">${nodes}</div>`+action+admin+judge+'</div>';

  let forCode=null;
  if(pending && clockCode===myCode) forCode=myCode;
  else if(!pending && clockCode===myCode) forCode=myCode;
  else if(isOwner && !pending && clockCode && clockCode!==myCode) forCode=clockCode;
  if(forCode) wireSearch(forCode);
  const b=$('bump'); if(b) b.addEventListener('click',doBump);
}

function searchRow(lockLabel){
  return `<div class="searchrow"><input id="s" placeholder="Search a rider still on the board..." autocomplete="off"><button class="lockbtn" id="lock" disabled>${esc(lockLabel)}</button><div class="ac" id="ac"></div></div>`;
}
function wireSearch(forCode){
  const input=$('s'), ac=$('ac'), lock=$('lock'); if(!input) return;
  const taken=new Set((draft.picks||[]).map(p=>p.rider));
  chosen=null; const label=lock.textContent;
  input.addEventListener('input',()=>{
    chosen=null; lock.disabled=true;
    const q=input.value.trim().toLowerCase();
    if(!q){ac.classList.remove('open');return;}
    const ms=RIDERS.filter(r=>!r.x&&!taken.has(r.r)&&(r.r.toLowerCase().includes(q)||r.t.toLowerCase().includes(q))).slice(0,8);
    ac.innerHTML=ms.length?ms.map((r,i)=>`<div class="ac-item" data-i="${i}"><img class="ac-av" src="${esc(r.p||'')}" onerror="this.style.visibility='hidden'"><span class="ac-rn">${esc(r.r)}</span><span class="ac-rt">${esc(r.t)}</span></div>`).join(''):`<div class="ac-item" style="color:var(--mute)">No match (full field: 171 riders)</div>`;
    ac.classList.add('open');
    ac.querySelectorAll('.ac-item[data-i]').forEach(it=>it.addEventListener('mousedown',e=>{e.preventDefault();chosen=ms[+it.dataset.i];input.value=chosen.r+'  ('+chosen.t+')';ac.classList.remove('open');lock.disabled=false;}));
  });
  input.addEventListener('blur',()=>setTimeout(()=>ac.classList.remove('open'),150));
  lock.addEventListener('click',()=>submitPick(forCode,label));
}

async function submitPick(forCode,label){
  if(!chosen) return;
  const code=forCode||myCode;
  const lock=$('lock'); if(lock){lock.disabled=true;lock.textContent='Saving...';}
  const ref=draftRef(); const picked=chosen;
  try{
    await db.runTransaction(async tx=>{
      const d=(await tx.get(ref)).data();
      if(d.status==='complete') throw new Error('draft closed');
      if(d.queue[0]!==code) throw new Error('not your turn');
      if((d.picks||[]).some(p=>p.rider===picked.r)) throw new Error('already taken');
      const pick={n:(d.picks||[]).length+1,player:code,rider:picked.r,team:picked.t,photo:picked.p||'',color:picked.c||'',by:myEmail,admin:code!==myCode};
      const queue=d.queue.slice(1);
      tx.update(ref,{picks:(d.picks||[]).concat([pick]),queue,status:queue.length?'live':'complete'});
    });
  }catch(e){ alert('Could not lock pick: '+(e.message||e)); const l=$('lock'); if(l){l.disabled=false;l.textContent=label||'Lock pick';} }
}
async function doBump(){
  const ref=draftRef();
  try{
    await db.runTransaction(async tx=>{
      const d=(await tx.get(ref)).data();
      if(!d.queue.length) return;
      const q=d.queue.slice(); q.push(q.shift());
      tx.update(ref,{queue:q,bumpedAt:FV.serverTimestamp()});
    });
  }catch(e){ alert('Bump failed: '+(e.message||e)); }
}
boot('Connecting...');
</script>
