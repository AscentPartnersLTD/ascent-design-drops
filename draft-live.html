<style>
  :root{--paper:#f6f3ea;--paper2:#efeadb;--card:#fffdf7;--ink:#1b1a17;--ink2:#4a463d;--mute:#928d81;--line:#e7e2d5;--line2:#d8d2c3;--gold:#e8b31e;--gold-d:#c9971a;--dark:#191813;--blue:#26347e;--green:#2f8f52;--red:#cf2530;--sh:0 1px 3px rgba(40,34,20,.07),0 8px 22px rgba(40,34,20,.06);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:800px;margin:0 auto;padding:0 0 60px}
  .topbar{background:var(--dark);color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative}
  .topbar::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--gold-d),var(--gold))}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:44px;height:44px;border-radius:11px;background:var(--gold);flex:none;display:flex;align-items:center;justify-content:center}
  .logo svg{width:28px;height:28px}
  .wm{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px;color:#fff}.wm span{color:var(--gold)}
  .tag{font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:9.5px;color:#b7b2a6;margin-top:4px}
  .who{font-size:11px;color:#b7b2a6;text-align:right;font-family:'Montserrat',sans-serif;font-weight:700}
  .who b{color:#fff;display:block;font-size:12px}
  .body{padding:22px}
  .signin{text-align:center;padding:40px 20px}
  .signin h2{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px}
  .gbtn{margin-top:14px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;color:#fff;background:var(--gold-d);border:none;border-radius:11px;padding:13px 26px;cursor:pointer}
  .msg{font-size:13px;color:var(--mute);margin-top:14px;min-height:18px}
  .msg.err{color:var(--red)}
  .draft{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh);padding:16px 18px}
  .dh{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .dh-l{display:flex;align-items:center;gap:10px}
  .dh-ico{width:30px;height:30px;border-radius:8px;background:var(--dark);display:flex;align-items:center;justify-content:center;flex:none}
  .dh-ico svg{width:19px;height:19px}
  .dh-t{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px}
  .dh-s{font-size:11.5px;color:var(--mute);margin-top:1px}
  .dh-badge{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;white-space:nowrap}
  .badge-clock{background:var(--gold-d);color:#fff}.badge-done{background:#e3f2e8;color:#256e3e}
  .ticker{display:flex;gap:6px;margin:16px 0 4px;align-items:flex-start}
  .tnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .tgap{width:1px;align-self:stretch;background:var(--line);margin:6px 5px 16px}
  .tav{width:42px;height:42px;border-radius:50%;position:relative;flex:none;display:flex;align-items:center;justify-content:center}
  .tav .ph{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
  .tav .fb{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px}
  .tav.pending{border:2px dashed var(--line2)}.tav.pending .fb{background:transparent!important;color:var(--mute);font-size:11px}
  .tav.clock{box-shadow:0 0 0 3px rgba(201,151,26,.28)}

  .tcap b{display:block;font-size:11px}
  .tname{font-size:10px;color:var(--ink2);font-weight:600;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .action{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .a-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;margin-bottom:9px}
  .searchrow{display:flex;gap:9px;position:relative}
  .searchrow input{flex:1;font-size:15px;padding:12px 13px;border:1px solid var(--line2);border-radius:11px;background:var(--paper)}

  .ac{position:absolute;left:0;right:96px;top:100%;background:#fff;border:1px solid var(--line2);border-radius:11px;box-shadow:0 10px 28px rgba(40,34,20,.15);z-index:20;margin-top:5px;max-height:230px;overflow:auto;display:none}
  .ac.open{display:block}
  .ac-item{padding:8px 11px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
  .ac-item:first-child{border-top:none}.ac-item:hover{background:var(--paper)}
  .ac-av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none;background:var(--line2)}
  .ac-rn{font-weight:600;font-size:14px}.ac-rt{color:var(--mute);font-size:12px;margin-left:auto}
  .waitline{font-size:13.5px;color:var(--ink2)}.waitline b{color:var(--ink)}
  .judge{background:#fdf3dc;border:1px solid #edd489;border-radius:12px;padding:13px 15px;margin-top:13px}
  .judge .j-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8a6d16}
  .judge .j-b{font-size:13.5px;margin:7px 0 11px}.judge .j-b b{font-weight:800}
  .j-skip{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:#fff;background:var(--red);border:none;border-radius:10px;padding:10px 18px;cursor:pointer}

  .note{font-size:11px;color:var(--mute);margin:16px 22px 0;line-height:1.55;text-align:center}
  .seedbar{font-size:11px;color:var(--mute);text-align:center;margin-top:10px}
</style>
</head>

":"#0082C3","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/56/71869/0:0,400:400-0-0-70/45bd4"},{"r":"R. Stannard","n":"Robert","t":"Bahrain Victorious","c":"#C8102E","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/76/71852/0:0,400:400-0-0-70/3a1bc"},{"r":"V. Paret Peintre","n":"Valentin","t":"Soudal Quick-Step","c":"#0033A0","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/93/71872/0:0,400:400-0-0-70/433fd"},{"r":"Q. Pacher","n":"Quentin","t":"Groupama-FDJ United","c":"#26429B","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/187/71808/0:0,400:400-0-0-70/2a953"},{"r":"K. Gradek","n":"Kamil","t":"Bahrain Victorious","c":"#C8102E","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/74/71746/0:0,400:400-0-0-70/5f073"},{"r":"P. Hagenes","n":"Per Strand","t":"Visma-Lease a Bike","c":"#E3C400","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/15/72255/0:0,400:400-0-0-70/6e9fc"},{"r":"D. Ballerini","n":"Davide","t":"XDS Astana Team","c":"#00A9CE","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/62/71726/0:0,400:400-0-0-70/1c851"},{"r":"P. Bittner","n":"Pavel","t":"Team Picnic PostNL","c":"#FF6900","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/213/71820/0:0,400:400-0-0-70/44948"},{"r":"P. Eenkhoorn","n":"Pascal","t":"Soudal Quick-Step","c":"#0033A0","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/92/71753/0:0,400:400-0-0-70/40ecb"},{"r":"I. Izagirre","n":"Ion","t":"Cofidis","c":"#E2001A","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/161/71895/0:0,400:400-0-0-70/0594b"},{"r":"N. Märkl","n":"Niklas","t":"Team Picnic PostNL","c":"#FF6900","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/216/71825/0:0,400:400-0-0-70/eca4d"},{"r":"M. Le Berre","n":"Mathis","t":"TotalEnergies","c":"#F04E23","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/206/71815/0:0,400:400-0-0-70/b6f6e"},{"r":"S. Wærenskjold","n":"Soren","t":"Uno-X Mobility","c":"#FF5C39","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/128/71887/0:0,400:400-70-0-70/0551b"}];
function _nrm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\u00e6/g,'ae').replace(/\u00f8/g,'o').replace(/\u00df/g,'ss').replace(/\u0142/g,'l');}
const init=r=>r.replace(/[^A-Za-z. ]/g,'').split(/[.\s]+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();

let me=null, myEmail=null, myCode=null, isOwner=false, isJudge=false, draft=null, unsub=null, chosen=null;

const $=id=>document.getElementById(id);
function boot(t){ $('boot').textContent=t||''; $('boot').style.display=t?'block':'none'; }

auth.onAuthStateChanged(async user=>{
  if(!user){ $('signin').style.display='block'; $('app').style.display='none'; boot(''); return; }
  me=user; myEmail=(user.email||'').toLowerCase(); isOwner=(myEmail===OWNER_EMAIL);
  $('signin').style.display='none';
  $('whoami').innerHTML=`signed in<b>${myEmail}</b>`;
  boot('Loading the draft...');
  try{
    await seedIfNeeded();
    myCode = ROSTER.players[myEmail] || null;
    isJudge = (myCode===ROSTER.judge);
    subscribe();
  }catch(e){ boot('Error: '+(e.message||e)); }
});

$('gbtn').addEventListener('click',()=>{
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e=>{ $('signmsg').textContent=e.message; $('signmsg').className='msg err'; });
});

async function seedIfNeeded(){
  if(!isOwner) return;
  const r=db.doc('config/roster'); if(!(await r.get()).exists) await r.set(ROSTER);
  const d=db.doc('drafts/'+STAGE); if(!(await d.get()).exists) await d.set(DRAFT_INIT);
  $('seedbar').textContent='Seeded roster + Stage 14 draft (owner).';
}

function subscribe(){
  $('app').style.display='block'; boot('');
  if(unsub) unsub();
  unsub=db.doc('drafts/'+STAGE).onSnapshot(snap=>{
    if(!snap.exists){ $('draftCard').innerHTML='<div class="allin"><div class="sm">No draft yet. Ask Allen (owner) to open the page first to seed it.</div></div>'; return; }
    draft=snap.data(); render();
  }, err=>{ $('draftCard').innerHTML='<div class="allin"><div class="sm" style="color:var(--red)">Permission error: '+err.message+'. (Are the security rules published, and are you on the roster?)</div></div>'; });
}

function head(sub,badge){
  return `<div class="dh"><div class="dh-l"><div class="dh-ico"><svg viewBox="0 0 40 40" fill="none"><path d="M4 31 L15 13 L21 22 L27 9 L36 31 Z" fill="#e8b31e"/><circle cx="27" cy="9" r="3.2" fill="#e8b31e"/></svg></div>
    <div><div class="dh-t">Stage 14 draft</div><div class="dh-s">${sub}</div></div></div>${badge||''}</div>`;
}
function riderAv(rider,pending,clock,player){
  if(pending) return `<span class="tav pending ${clock?'clock':''}"><span class="fb" style="color:${PMETA[player].c}">${player}</span></span>`;
  const fb=`<span class="fb" style="background:${rider.c||'#888'}">${init(rider.r)}</span>`;
  const img=rider.p?`<img class="ph" src="${rider.p}" onerror="this.remove()">`:'';
  return `<span class="tav">${fb}${img}</span>`;
}
function render(){
  const picks=draft.picks||[], queue=draft.queue||[];
  const clockCode=queue[0]||null;
  const done=draft.status==='complete'||queue.length===0;
  // ticker: 8 nodes = picks (filled) then queue (pending)
  let nodes='';
  for(let i=0;i<8;i++){
    if(i===4) nodes+='<div class="tgap"></div>';
    if(i<picks.length){
      const pk=picks[i];
      nodes+=`<div class="tnode">${riderAv({r:pk.rider,t:pk.team,c:'#888',p:pk.photo},false)}<div class="tcap"><b style="color:${PMETA[pk.player].c}">#${i+1}</b>${pk.player}</div><div class="tname">${pk.rider}</div></div>`;
    } else {
      const qi=i-picks.length, player=queue[qi], clk=(qi===0&&!done);
      nodes+=`<div class="tnode">${riderAv(null,true,clk,player)}<div class="tcap"><b style="color:${PMETA[player].c}">#${i+1}</b>${player}</div></div>`;
    }
  }
  let badge = done?`<span class="dh-badge badge-done">All ${picks.length} in</span>`
    : `<span class="dh-badge badge-clock">${PMETA[clockCode].n} on the clock</span>`;
  let action='';
  if(done){
    action=`<div class="action"><div class="allin"><div class="big">All picks are in.</div><div class="sm">These post to the board at the stage start.</div></div></div>`;
  } else if(clockCode===myCode){
    action=`<div class="action"><div class="a-h">You are on the clock &middot; pick #${picks.length+1}</div>
      <div class="searchrow"><input id="s" placeholder="Search a rider still on the board..." autocomplete="off"><button class="lockbtn" id="lock" disabled>Lock pick</button><div class="ac" id="ac"></div></div></div>`;
  } else {
    const mine=queue.map((c,idx)=>c===myCode?idx:-1).filter(x=>x>=0);
    const nextTxt = myCode ? (mine.length?`Your next turn is pick #${picks.length+mine[0]+1}.`:`Both your picks are in.`) : `You are watching.`;
    action=`<div class="action"><div class="waitline"><b>${PMETA[clockCode].n} is on the clock.</b> ${nextTxt}</div></div>`;
  }
  // judge bump: shown to the judge when someone else is on the clock and there is a queue
  let judge='';
  if(isJudge && !done && clockCode && clockCode!==myCode){
    judge=`<div class="judge"><div class="j-h">Judge control</div><div class="j-b">Waiting on <b>${PMETA[clockCode].n}</b> (pick #${picks.length+1}). Bump them to the back of the order?</div><button class="j-skip" id="bump">Bump ${PMETA[clockCode].n} to the back</button></div>`;
  }
  $('draftCard').innerHTML=head(`Snake draft &middot; ${done?'complete':'live'}`,badge)+`<div class="ticker">${nodes}</div>`+action+judge;
  if(clockCode===myCode && !done) wireSearch();
  const b=$('bump'); if(b) b.addEventListener('click',doBump);
}

function wireSearch(){
  const input=$('s'), ac=$('ac'), lock=$('lock');
  const taken=new Set((draft.picks||[]).map(p=>p.rider));
  chosen=null;
  input.addEventListener('input',()=>{
    chosen=null; lock.disabled=true;
    const q=input.value.trim().toLowerCase();
    if(!q){ac.classList.remove('open');return;}
    const ms=RIDERS.filter(r=>!r.x&&!taken.has(r.r)&&(_nrm(r.r).includes(_nrm(q))||_nrm(r.n||'').includes(_nrm(q))||_nrm(r.t).includes(_nrm(q)))).slice(0,8);
    ac.innerHTML=ms.length?ms.map((r,i)=>`<div class="ac-item" data-i="${i}"><img class="ac-av" src="${r.p||''}" onerror="this.style.visibility='hidden'"><span class="ac-rn">${r.r}</span><span class="ac-rt">${r.t}</span></div>`).join(''):`<div class="ac-item" style="color:var(--mute)">No match (this demo carries 35 riders; full field comes next)</div>`;
    ac.classList.add('open');
    ac.querySelectorAll('.ac-item[data-i]').forEach(it=>it.addEventListener('mousedown',e=>{e.preventDefault();chosen=ms[+it.dataset.i];input.value=chosen.r+'  ('+chosen.t+')';ac.classList.remove('open');lock.disabled=false;}));
  });
  input.addEventListener('blur',()=>setTimeout(()=>ac.classList.remove('open'),150));
  lock.addEventListener('click',submitPick);
}

async function submitPick(){
  if(!chosen) return;
  $('lock').disabled=true; $('lock').textContent='Saving...';
  const ref=db.doc('drafts/'+STAGE);
  try{
    await db.runTransaction(async tx=>{
      const d=(await tx.get(ref)).data();
      if(d.status!=='open') throw new Error('draft closed');
      if(d.queue[0]!==myCode) throw new Error('not your turn');
      if((d.picks||[]).some(p=>p.rider===chosen.r)) throw new Error('already taken');
      const pick={n:(d.picks||[]).length+1,player:myCode,rider:chosen.r,team:chosen.t,photo:chosen.p||'',by:myEmail};
      const queue=d.queue.slice(1);
      tx.update(ref,{picks:(d.picks||[]).concat([pick]),queue,status:queue.length?'open':'complete'});
    });
  }catch(e){ alert('Could not lock pick: '+(e.message||e)); const l=$('lock'); if(l){l.disabled=false;l.textContent='Lock pick';} }
}
async function doBump(){
  const ref=db.doc('drafts/'+STAGE);
  try{
    await db.runTransaction(async tx=>{
      const d=(await tx.get(ref)).data();
      if(!d.queue.length) return;
      const q=d.queue.slice(); q.push(q.shift());
      tx.update(ref,{queue:q,bumpedAt:FV.serverTimestamp()});
    });
  }catch(e){ alert('Bump failed: '+(e.message||e)); }
}
boot('Connecting...');
</script>
