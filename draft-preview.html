<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Col du Fantasy - Draft on the board (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f3ea;--paper2:#efeadb;--card:#fffdf7;--ink:#1b1a17;--ink2:#4a463d;
    --mute:#928d81;--line:#e7e2d5;--line2:#d8d2c3;--gold:#e8b31e;--gold-d:#c9971a;
    --dark:#191813;--blue:#26347e;--green:#2f8f52;--red:#cf2530;
    --sh:0 1px 3px rgba(40,34,20,.07),0 8px 22px rgba(40,34,20,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:0 0 60px}

  .switch{display:flex;gap:7px;flex-wrap:wrap;align-items:center;padding:12px 18px;background:#eef1f8;border-bottom:1px solid #dbe0ef;font-size:12px;color:#3a4a7a}
  .switch b{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.05em;font-size:10px;margin-right:4px}
  .sbtn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;border:1px solid #b9c2de;background:#fff;color:#3a4a7a;border-radius:999px;padding:5px 12px;cursor:pointer}
  .sbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

  /* board context */
  .tabs{display:flex;gap:26px;padding:16px 20px 0;border-bottom:1px solid var(--line);overflow:auto}
  .tabs span{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-size:12px;color:var(--mute);padding-bottom:12px;white-space:nowrap}
  .tabs span.on{color:var(--ink);border-bottom:2px solid var(--gold-d)}
  .board{padding:20px}

  /* ---- the draft card (refined, ticker style) ---- */
  .draft{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh);padding:16px 18px;margin-bottom:14px;transition:.2s}
  .dh{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .dh-l{display:flex;align-items:center;gap:10px}
  .dh-ico{width:30px;height:30px;border-radius:8px;background:var(--dark);display:flex;align-items:center;justify-content:center;flex:none}
  .dh-ico svg{width:19px;height:19px}
  .dh-t{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px}
  .dh-s{font-size:11.5px;color:var(--mute);margin-top:1px}
  .dh-badge{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;white-space:nowrap}
  .badge-clock{background:var(--gold-d);color:#fff}
  .badge-done{background:#e3f2e8;color:#256e3e}

  .ticker{display:flex;gap:6px;margin:16px 0 4px;align-items:flex-start}
  .tnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .tnode.gap{flex:0 0 12px}
  .tgap{width:1px;align-self:stretch;background:var(--line);margin:6px 5px 16px}
  .tav{width:42px;height:42px;border-radius:50%;position:relative;flex:none;display:flex;align-items:center;justify-content:center}
  .tav .ph,.tav .fb{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
  .fb{display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px}
  .tav.pending{border:2px dashed var(--line2)}
  .tav.pending .fb{background:transparent;color:var(--mute);border:none;font-size:11px}
  .tav.clock{box-shadow:0 0 0 3px rgba(201,151,26,.28)}
  .tcap{font-size:9px;color:var(--mute);font-family:'Montserrat',sans-serif;font-weight:700;text-align:center;line-height:1.35}
  .tcap b{display:block;font-size:11px}
  .tname{font-size:10px;color:var(--ink2);font-weight:600;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .action{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .yourturn .a-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;margin-bottom:9px}
  .searchrow{display:flex;gap:9px}
  .searchrow input{flex:1;font-size:15px;padding:12px 13px;border:1px solid var(--line2);border-radius:11px;background:var(--paper)}
  .searchrow input:focus{outline:none;border-color:var(--gold-d);background:#fff}
  .lockbtn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:#fff;background:var(--gold-d);border:none;border-radius:11px;padding:0 20px;cursor:pointer;white-space:nowrap}
  .waitline{font-size:13.5px;color:var(--ink2)}
  .waitline b{color:var(--ink)}

  /* collapsed */
  .draft.mini{padding:11px 16px}
  .mini-row{display:flex;align-items:center;gap:12px}
  .mini-strip{display:flex;gap:4px;margin-left:auto}
  .mini-av-w{width:26px;height:26px;border-radius:50%;background:var(--line2);border:1.5px solid #fff;box-shadow:0 1px 2px rgba(0,0,0,.15);overflow:hidden;flex:none;position:relative}
  .mini-av-w img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .mini-more{font-size:11px;color:var(--gold-d);font-family:'Montserrat',sans-serif;font-weight:800;cursor:pointer;white-space:nowrap}

  /* judge override */
  .judge{background:#fdf3dc;border:1px solid #edd489;border-radius:12px;padding:14px 16px;margin-top:14px}
  .judge .j-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#8a6d16;display:flex;align-items:center;gap:8px}
  .judge .j-b{font-size:14px;color:var(--ink);margin:8px 0 12px}
  .judge .j-b b{font-weight:800}
  .j-btns{display:flex;gap:9px}
  .j-skip{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:#fff;background:var(--red);border:none;border-radius:10px;padding:11px 20px;cursor:pointer}
  .j-hold{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:var(--ink2);background:#fff;border:1px solid var(--line2);border-radius:10px;padding:11px 20px;cursor:pointer}

  /* live break check (context, approximated from the real card) */
  .bw{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}
  .bw-l{display:flex;align-items:center;gap:10px}
  .bw-t{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px}
  .bw-s{font-size:12px;color:var(--mute);margin-top:2px}
  .bw-btn{background:var(--gold-d);color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;border-radius:999px;padding:9px 16px;white-space:nowrap}
  .ctxlab{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;font-family:'Montserrat',sans-serif;font-weight:700;margin:20px 0 8px}
  .ac{position:absolute;background:#fff;border:1px solid var(--line2);border-radius:11px;box-shadow:0 10px 28px rgba(40,34,20,.15);z-index:20;margin-top:5px;max-height:210px;overflow:auto;display:none}
  .ac.open{display:block}
  .ac-item{padding:8px 11px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
  .ac-item:first-child{border-top:none}.ac-item:hover{background:var(--paper)}
  .ac-av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none}
  .ac-rn{font-weight:600;font-size:14px}.ac-rt{color:var(--mute);font-size:12px;margin-left:auto}
  @media(max-width:560px){ .tname{display:none} .tcap b{font-size:10px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="switch">
    <b>See state</b>
    <button class="sbtn on" data-st="your">Your turn</button>
    <button class="sbtn" data-st="wait">Waiting on someone</button>
    <button class="sbtn" data-st="done">All picks in (collapsed)</button>
    <button class="sbtn" data-st="judge">Judge override</button>
  </div>

  <div class="tabs"><span class="on">Overview</span><span>Stage Ledger</span><span>Stats</span><span>Allegiances</span><span>Hits</span></div>

  <div class="board">
    <div class="ctxlab">This is the top of the Overview</div>
    <div id="draftMount"></div>

    <div class="ctxlab">Live Break Check (sits right below)</div>
    <div class="bw">
      <div class="bw-l">
        <svg width="34" height="18" viewBox="0 0 38 20"><g fill="#928d81"><circle cx="3.5" cy="10" r="1.7"/><circle cx="6.5" cy="6.6" r="1.7"/><circle cx="6.6" cy="13.4" r="1.7"/><circle cx="9.6" cy="9.9" r="1.7"/><circle cx="9.7" cy="3.7" r="1.7"/><circle cx="9.8" cy="16.1" r="1.7"/><circle cx="12.7" cy="6.7" r="1.7"/><circle cx="12.8" cy="13.2" r="1.7"/></g><g fill="#c9971a"><circle cx="24.5" cy="10" r="1.9"/><circle cx="28" cy="7.4" r="1.9"/><circle cx="31.5" cy="10" r="1.9"/></g></svg>
        <div><div class="bw-t">Live Break Check</div><div class="bw-s">Who is up the road right now, straight from the official feed</div></div>
      </div>
      <span class="bw-btn">Who's in the break?</span>
    </div>
  </div>
</div>

<script>
const R = [{"r":"T. Pogacar","t":"UAE Team Emirates XRG","c":"#d4111e","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/1/71834/0:0,400:400-0-0-70/9a582"},{"r":"J. Vingegaard","t":"Visma-Lease a Bike","c":"#E3C400","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/11/72252/0:0,400:400-0-0-70/38b77"},{"r":"R. Evenepoel","t":"Red Bull-BORA-hansgrohe","c":"#223971","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/21/71737/0:0,400:400-0-0-70/36350"},{"r":"I. del Toro","t":"UAE Team Emirates XRG","c":"#d4111e","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/2/71837/0:0,400:400-0-0-70/5d784"},{"r":"J. Ayuso","t":"Lidl-Trek","c":"#001E62","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/31/71732/0:0,400:400-0-0-70/b2640"},{"r":"F. Lipowitz","t":"Red Bull-BORA-hansgrohe","c":"#223971","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/25/71731/0:0,400:400-0-0-70/ce3e1"},{"r":"A. Yates","t":"UAE Team Emirates XRG","c":"#d4111e","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/8/71870/0:0,400:400-0-0-70/231b7"},{"r":"B. Healy","t":"EF Education-EasyPost","c":"#FF0098","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/44/71874/0:0,400:400-0-0-70/8d88c"},{"r":"T. Pidcock","t":"Pinarello Q36.5","c":"#009CA6","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/171/71794/0:0,400:400-0-0-70/526ee"},{"r":"R. Carapaz","t":"EF Education-EasyPost","c":"#FF0098","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/41/71725/0:0,400:400-0-0-70/7396a"},{"r":"B. McNulty","t":"UAE Team Emirates XRG","c":"#d4111e","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/4/71836/0:0,400:400-0-0-70/8efa9"},{"r":"T. Merlier","t":"Soudal Quick-Step","c":"#0033A0","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/91/71752/0:0,400:400-0-0-70/70dcd"},{"r":"B. Girmay","t":"NSN Cycling Team","c":"#F7A600","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/131/71889/0:0,400:400-0-0-70/d6cec"},{"r":"O. Kooij","t":"Decathlon CMA CGM Team","c":"#0082C3","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/55/71846/0:0,400:400-0-0-70/14a75"},{"r":"J. Philipsen","t":"Alpecin-Premier Tech","c":"#6B0F1A","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/105/71879/0:0,400:400-0-0-70/47c2e"},{"r":"A. Baudin","t":"EF Education-EasyPost","c":"#FF0098","p":"https://img.aso.fr/core_app/img-cycling-tdf-png/43/71742/0:0,400:400-0-0-70/f78a8"}];
const byName=n=>R.find(x=>x.r.toLowerCase().includes(n.toLowerCase()));
const P={AA:{n:"Allen",c:"#c9971a"},JJ:{n:"Jeff Johns",c:"#26347e"},JB:{n:"Jeff Bush",c:"#2f8f52"},JP:{n:"Jason",c:"#cf2530"}};
const ORDER=["AA","JB","JJ","JP"];
const SNAKE=ORDER.concat(ORDER.slice().reverse());   // AA,JB,JJ,JP,JP,JJ,JB,AA
const FULL=[byName("Pogacar"),byName("Vingegaard"),byName("Evenepoel"),byName("del Toro"),byName("Ayuso"),byName("Lipowitz"),byName("Yates"),byName("Healy")];
const init=r=>r.r.replace(/[^A-Za-z. ]/g,'').split(/[.\s]+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();

function av(rider,cls){ return rider
  ? `<span class="tav ${cls||''}"><span class="fb" style="background:${rider.c}">${init(rider)}</span><img class="ph" src="${rider.p}" onerror="this.remove()"></span>`
  : ''; }

function ticker(filled, clockIdx){
  let out='';
  for(let i=0;i<8;i++){
    if(i===4) out+=`<div class="tgap"></div>`;
    const player=SNAKE[i], rider=i<filled?FULL[i]:null, isClock=(i===clockIdx);
    const node = rider
      ? av(rider, isClock?'clock':'')
      : `<span class="tav pending ${isClock?'clock':''}"><span class="fb" style="color:${P[player].c}">${player}</span></span>`;
    out+=`<div class="tnode">${node}
      <div class="tcap"><b style="color:${P[player].c}">#${i+1}</b>${player}</div>
      ${rider?`<div class="tname">${rider.r}</div>`:''}</div>`;
  }
  return `<div class="ticker">${out}</div>`;
}

function head(sub, badge){
  return `<div class="dh"><div class="dh-l">
    <div class="dh-ico"><svg viewBox="0 0 40 40" fill="none"><path d="M4 31 L15 13 L21 22 L27 9 L36 31 Z" fill="#e8b31e"/><circle cx="27" cy="9" r="3.2" fill="#e8b31e"/></svg></div>
    <div><div class="dh-t">Stage 14 draft</div><div class="dh-s">${sub}</div></div></div>
    ${badge||''}</div>`;
}

function render(state){
  const m=document.getElementById('draftMount');
  if(state==='your'){
    m.innerHTML=`<div class="draft">${head('Snake draft &middot; you pick 1st and 8th', `<span class="dh-badge badge-clock">Your pick &middot; #4</span>`)}
      ${ticker(3,3)}
      <div class="action yourturn">
        <div class="a-h">You are on the clock</div>
        <div class="searchrow" style="position:relative">
          <input id="s" placeholder="Search a rider still on the board..." autocomplete="off">
          <button class="lockbtn">Lock pick</button>
          <div class="ac" id="ac"></div>
        </div>
      </div></div>`;
    wireSearch();
  } else if(state==='wait'){
    m.innerHTML=`<div class="draft">${head('Snake draft &middot; you pick 1st and 8th', `<span class="dh-badge badge-clock">Jeff Bush on the clock</span>`)}
      ${ticker(3,3)}
      <div class="action"><div class="waitline"><b>Jason is on the clock</b> for pick #4. Your next pick is #8. You will get a ping when you are up.</div></div></div>`;
  } else if(state==='done'){
    m.innerHTML=`<div class="draft mini"><div class="mini-row">
      ${head('Locked in &middot; posts to the board at the stage start', `<span class="dh-badge badge-done">All 8 in</span>`).replace('<div class="dh"','<div class="dh" style="flex:1"')}
      <div class="mini-strip">${FULL.map(r=>`<span class="mini-av-w" title="${r.r}"><img src="${r.p}" onerror="this.remove()"></span>`).join('')}</div>
      </div></div>`;
  } else if(state==='judge'){
    m.innerHTML=`<div class="draft">${head('Snake draft &middot; running late', `<span class="dh-badge badge-clock">Jeff Bush on the clock</span>`)}
      ${ticker(6,6)}
      <div class="judge">
        <div class="j-h"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8a6d16" stroke-width="2.2"><path d="M12 3v18M5 7h14M7 7l-3 6h6zM17 7l3 6h-6z"/></svg> Judge call &middot; 10 minutes to start</div>
        <div class="j-b">The draft is waiting on <b>Jeff Bush</b> (pick #7). Skip his turn so the others can finish before the stage rolls out?</div>
        <div class="j-btns"><button class="j-skip">Skip Jeff Bush</button><button class="j-hold">Hold, give him a minute</button></div>
      </div></div>`;
  }
}
function wireSearch(){
  const input=document.getElementById('s'), ac=document.getElementById('ac');
  const taken=new Set(FULL.slice(0,3).map(r=>r.r));
  input.addEventListener('input',()=>{
    const q=input.value.trim().toLowerCase();
    if(!q){ac.classList.remove('open');return;}
    const ms=R.filter(r=>!taken.has(r.r)&&(r.r.toLowerCase().includes(q)||r.t.toLowerCase().includes(q))).slice(0,6);
    ac.innerHTML=ms.length?ms.map(r=>`<div class="ac-item"><img class="ac-av" src="${r.p}" onerror="this.style.visibility='hidden'"><span class="ac-rn">${r.r}</span><span class="ac-rt">${r.t}</span></div>`).join(''):`<div class="ac-item" style="color:#928d81">No match</div>`;
    ac.classList.add('open');
    ac.querySelectorAll('.ac-item').forEach(it=>it.addEventListener('mousedown',e=>{e.preventDefault();input.value=it.querySelector('.ac-rn').textContent;ac.classList.remove('open');}));
  });
  input.addEventListener('blur',()=>setTimeout(()=>ac.classList.remove('open'),120));
}
document.querySelectorAll('.sbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');render(b.dataset.st);
}));
render('your');
</script>
</body>
</html>
