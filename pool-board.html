<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Col du Fantasy - Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light only;
    --paper:#ffffff;--paper2:#faf8f2;--card:#f6f3ea;--line:#e7e2d5;--line2:#d8d2c3;
    --ink:#1b1a17;--ink2:#4c4a44;--mute:#928d81;--gray:#d3cfc4;--grayd:#a8a396;
    --gold:#e8b31e;--gold-d:#c9971a;--dot:#ffe000;--blue:#26347e;--red:#cf2530;--green:#3aa564;
    --sh:0 1px 2px rgba(27,26,23,.05),0 4px 14px rgba(27,26,23,.055);
    --sh-lg:0 2px 6px rgba(27,26,23,.07),0 12px 34px rgba(27,26,23,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;background:#ffffff;color-scheme:light only}
  body{background:#ffffff;color:#1b1a17;font-family:'Inter',system-ui,sans-serif;line-height:1.5;padding:0 0 70px;-webkit-font-smoothing:antialiased}
  @media (prefers-color-scheme: dark){
    html,body{background:#ffffff !important;color:#1b1a17 !important}
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 22px}
  .num{font-family:'Montserrat',sans-serif;font-variant-numeric:tabular-nums}

  header.mast{position:relative;overflow:hidden;background:var(--ink);border-bottom:3px solid var(--gold);padding:24px 0 30px}
  header.mast .profile{position:absolute;left:0;right:0;bottom:0;width:100%;height:80px;z-index:1;pointer-events:none;display:block}
  header.mast .profile .fill{opacity:.12}
  header.mast .profile .line{opacity:.42}
  header.mast .profile .summit{opacity:.6}
  header.mast .wrap{position:relative;z-index:2}
  .mast-in{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .mast-logo{height:64px;width:64px;border-radius:14px;display:block;flex:none;box-shadow:0 7px 22px rgba(0,0,0,.42)}
  .mast-t{flex:1;min-width:180px}
  .race-ind{flex:none;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;max-width:150px}
  .race-ind .cap{font-family:'Montserrat',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:#8f8a7f}
  .race-plate{background:var(--paper);border-radius:10px;padding:7px 11px;box-shadow:0 5px 16px rgba(0,0,0,.35)}
  .race-plate img{height:34px;width:auto;display:block}
  .race-ind .rname{font-family:'Montserrat',sans-serif;font-size:9.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:#cfcabd;line-height:1.2}
  .mast-t .h{font-family:'Montserrat',sans-serif;font-weight:900;text-transform:uppercase;font-size:clamp(26px,6vw,44px);letter-spacing:-1px;line-height:0.86;color:var(--paper)}
  .mast-t .h span{color:var(--gold)}
  .mast-t .s{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#b7b2a6;font-weight:600;margin-top:7px}
  .hero-lead{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
  .hero-chip{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:9px 15px 9px 12px;backdrop-filter:blur(2px)}
  .hero-chip .badge{width:30px;height:30px;border-radius:8px;background:var(--gold);color:var(--ink);font-family:'Montserrat',sans-serif;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none}
  .hero-chip .meta{display:flex;flex-direction:column;line-height:1.15}
  .hero-chip .cap{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#b7b2a6}
  .hero-chip .val{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:var(--paper)}
  .hero-chip .val em{font-style:normal;color:var(--gold);font-weight:900;margin-right:5px}
  .hero-chip .val small{color:#9a958a;font-weight:600;font-size:10px;margin-left:4px}

  nav.tabs{display:flex;border-bottom:1px solid var(--line2);margin:0 0 30px;flex-wrap:wrap}
  nav.tabs button{background:none;border:none;color:var(--mute);font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:1.5px;font-size:13px;font-weight:700;padding:15px 20px;cursor:pointer;position:relative;transition:color .15s}
  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button.on{color:var(--ink)}
  nav.tabs button.on::after{content:"";position:absolute;left:0;bottom:-1px;width:100%;height:3px;background:var(--gold)}

  section.tab{display:none}
  section.tab.on{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .eyebrow{font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:2px;font-size:12px;color:var(--mute);font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:12px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
  .eyebrow.mt{margin-top:34px}

  .info{display:grid;grid-template-columns:300px 1fr;gap:34px;margin-bottom:14px}
  .callouts{display:flex;flex-direction:column;gap:22px}
  .callout .n{font-family:'Montserrat',sans-serif;font-weight:900;font-size:56px;line-height:0.85;color:var(--gold);letter-spacing:-1px}
  .callout .l{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;font-size:18px;letter-spacing:-0.2px;color:var(--ink);margin-top:2px}
  .callout .d{font-size:12px;color:var(--mute);margin-top:3px;max-width:260px}
  .insight{display:flex;gap:12px;align-items:flex-start;border-top:1px solid var(--line);padding-top:18px}
  .insight .txt{font-size:13.5px;font-weight:500;color:var(--ink2);line-height:1.45}
  .insight .txt b{font-weight:700;color:var(--ink)}
  .insight .txt .hl{background:var(--gold);color:var(--ink);padding:0 4px;font-weight:700}
  .arrow{flex-shrink:0;width:38px;height:26px;margin-top:2px}
  .flag{display:flex;height:26px;width:64px;border:1px solid var(--line);margin-top:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .flag i{flex:1;display:block}
  .flag .b{background:var(--blue)} .flag .w{background:#fff} .flag .r{background:var(--red)}
  .flag-row{display:flex;align-items:center;gap:10px}
  .flag-row .c{font-size:11px;color:var(--mute);line-height:1.35}

  .charts{display:flex;flex-direction:column;gap:28px}
  .chart .ct{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:0.3px;margin-bottom:14px;color:var(--ink)}
  .chart .ct small{color:var(--mute);font-weight:600;text-transform:none;letter-spacing:0;font-size:11px;margin-left:6px}
  .bars{display:flex;flex-direction:column;gap:11px}
  .bar-row{display:grid;grid-template-columns:56px 1fr auto;align-items:center;gap:12px}
  .bar-row .who{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase}
  .bar-row.lead .who{color:var(--gold-d)}
  .bar-track{height:26px;position:relative}
  .bar-fill{height:100%;background:var(--gray);border-radius:0 3px 3px 0;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .bar-row.lead .bar-fill{background:var(--gold)}
  .bar-val{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;min-width:34px;text-align:right}
  .hl-tile{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .hl-tile .big{font-family:'Montserrat',sans-serif;font-weight:900;font-size:34px;color:var(--gold);line-height:0.9;white-space:nowrap}
  .hl-tile .t{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;font-size:13px}
  .hl-tile .b{font-size:12px;color:var(--ink2);margin-top:2px}

  .gc{width:100%;border-collapse:collapse;margin:8px 0 6px}
  .gc th{font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:11px;color:var(--mute);font-weight:700;text-align:left;padding:9px 12px;border-bottom:2px solid var(--ink)}
  .gc th.r,.gc td.r{text-align:right}
  .gc td{padding:13px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  .gc .pos{font-family:'Montserrat',sans-serif;font-weight:800;color:var(--mute);width:34px}
  .gc .rider{font-family:'Montserrat',sans-serif;text-transform:uppercase;font-size:18px;font-weight:800;letter-spacing:-0.2px}
  .gc .full{font-size:11px;color:var(--mute);text-transform:none;letter-spacing:0;font-weight:500;font-family:'Inter',sans-serif;margin-top:1px}
  .gc .big{font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px}
  .gc .lead-val{color:var(--gold-d)}
  .gc tr.lead td{background:#fdf7e6}
  .gc tr.lead .rider{color:var(--gold-d)}
  .lead-tag{display:inline-block;font-family:'Montserrat',sans-serif;font-weight:800;font-size:9px;letter-spacing:0.5px;background:var(--gold);color:var(--ink);padding:2px 7px;border-radius:3px;vertical-align:middle;margin-left:8px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  .metric-note{font-size:11px;color:var(--mute);margin-top:4px}

  .stage{background:var(--paper);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px}
  .stage.dns{background:var(--paper2);border-style:dashed}
  .stage.live{border-color:var(--gold);border-width:2px}
  .stage-head{display:grid;grid-template-columns:auto 1fr auto auto;gap:16px;align-items:center;padding:15px 18px;cursor:pointer;transition:background .15s}
  .stage-head:hover{background:var(--paper2)}
  .stnum{font-family:'Montserrat',sans-serif;font-weight:900;font-size:14px;color:#fff;background:var(--ink);border-radius:7px;padding:8px 10px;text-align:center;min-width:60px;line-height:1}
  .stnum.g{background:var(--gold);color:var(--ink)}
  .stnum small{display:block;font-size:9px;letter-spacing:0.5px;margin-top:3px;font-weight:600;opacity:.75}
  .stinfo .route{font-family:'Montserrat',sans-serif;text-transform:uppercase;font-weight:800;font-size:16px;letter-spacing:-0.2px}
  .stinfo .sub{font-size:11px;color:var(--mute);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .stinfo .sub .type{color:var(--ink2);font-weight:600}
  .profile{width:96px;height:36px;flex-shrink:0}
  .st-right{font-family:'Montserrat',sans-serif;text-align:right;white-space:nowrap;font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  .st-right b{display:block;font-size:12px;font-weight:800;color:var(--ink);letter-spacing:0}
  .dns-stamp{font-family:'Montserrat',sans-serif;font-weight:900;font-size:13px;letter-spacing:1px;color:var(--red);border:2px solid var(--red);border-radius:5px;padding:4px 8px;transform:rotate(-4deg)}
  .stage-body{display:none;padding:0 18px 18px;border-top:1px solid var(--line)}
  .stage.open .stage-body{display:block}
  .picks{width:100%;border-collapse:collapse;margin:14px 0 4px}
  .picks th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);text-align:left;padding:6px 8px;font-weight:700;font-family:'Montserrat',sans-serif}
  .picks th.r,.picks td.r{text-align:right}
  .picks td{padding:10px 8px;border-top:1px solid var(--line);font-size:14px}
  .picks .plr{font-family:'Montserrat',sans-serif;text-transform:uppercase;font-weight:800;font-size:15px}
  .picks .rid{color:var(--ink)}
  .picks .pl{font-family:'Montserrat',sans-serif;color:var(--mute);font-weight:600}
  .picks .pl b{color:var(--ink)}
  .picks .sum{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px}
  .note{font-size:13px;color:var(--ink2);background:var(--paper2);border-left:3px solid var(--gold);padding:12px 15px;border-radius:0 7px 7px 0;margin-top:12px}
  .note .lab{font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:1.5px;font-size:10px;color:var(--gold-d);font-weight:800;display:block;margin-bottom:3px}
  .note .readrow{margin-top:6px;line-height:1.5}
  .note .readrow:first-of-type{margin-top:2px}
  .note .readrow b{font-family:'Montserrat',sans-serif;font-weight:800;margin-right:5px}
  .note .isum{margin-bottom:6px;line-height:1.5}
  .note .ifacts{margin:4px 0 0;padding-left:18px;font-size:12.5px;line-height:1.5}
  .note .ifacts li{margin-bottom:4px}
  .prov{font-size:11px;color:var(--red);font-family:'Montserrat',sans-serif;font-weight:600;margin-top:8px}
  .verify-line{font-size:12px;color:var(--ink2);background:#fff8e6;border:1px solid #f0dca0;border-radius:8px;padding:9px 12px;margin-top:12px;line-height:1.45}
  .vflag{display:inline-block;font-family:'Montserrat',sans-serif;font-weight:800;font-size:9px;letter-spacing:0.5px;background:var(--gold);color:var(--ink);padding:2px 6px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .vdot{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.5px;color:var(--gold-d);text-transform:uppercase}
  .verify-panel{background:#fff8e6;border:1px solid #f0dca0;border-radius:12px;padding:16px 18px;margin:8px 0 6px}
  .verify-panel .vh{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:1px;font-size:12px;color:var(--gold-d);display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .verify-panel ul{list-style:none;margin:0;padding:0}
  .verify-panel li{font-size:12.5px;color:var(--ink2);padding:6px 0;border-top:1px solid #f0dca0;line-height:1.45}
  .verify-panel li:first-child{border-top:none}
  .verify-panel li b{font-family:'Montserrat',sans-serif;font-weight:800;color:var(--ink);margin-right:6px}
  .minor-note{font-size:11.5px;color:var(--mute);margin-top:10px;padding-top:10px;border-top:1px solid #f0dca0;line-height:1.45}
  .recon-panel{margin-top:18px;border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:#fff}
  .recon-panel .vh{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:10px}
  table.recon{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:6px}
  table.recon th{text-align:left;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.04em;padding:4px 8px;border-bottom:1px solid var(--line)}
  table.recon td{padding:5px 8px;border-bottom:1px solid #f4f1ea}
  table.recon td.r,table.recon th.r{text-align:right}
  table.recon .plr{font-family:'Montserrat',sans-serif;font-weight:800}
  table.recon .ok{color:#1a8a3a;font-weight:700}
  table.recon .off{color:#c0392b;font-weight:800}
  table.recon .incn{color:var(--mute);font-weight:400;font-size:11px}
  .recon-panel .rh{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--gold-ink,#8a6a12);margin:14px 0 6px}
  .recon-panel .asklist{margin:0;padding-left:18px;font-size:12.5px;line-height:1.5}
  .recon-panel .asklist li{margin-bottom:7px}
  .recon-panel .recfoot{font-size:11.5px;color:var(--mute);margin-top:12px;padding-top:10px;border-top:1px solid #f4f1ea;line-height:1.45}
  .metricwrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;align-items:start}
  /* Mobile: flatten the two metric columns so the weather card sits directly above the stage profiles */
  @media(max-width:560px){
    .metricwrap > div:not(.metricbox){display:contents}
    #winnersBox{order:1}
    #avgBox{order:2}
    #weatherBox{order:3;margin-top:0}
    #sigBox{order:4}
  }
  .metricbox{border:1px solid var(--line);border-radius:14px;padding:15px 16px;background:#fff}
  .metricbox .mh{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;letter-spacing:.01em}
  .metricbox .msub{font-size:11px;color:var(--mute);margin:2px 0 12px}
  .mrow{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .mrow .mcode{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;width:26px;flex:none}
  .mrow .mtrack{flex:1;height:11px;background:#f2efe8;border-radius:6px;overflow:hidden}
  .mrow .mfill{display:block;height:100%;border-radius:8px}
  .mrow .mval{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;width:52px;text-align:right;flex:none}
  .sigrow{padding:9px 0;border-bottom:1px solid #f4f1ea}
  .sigrow:last-child{border-bottom:none}
  .sigrow .sc{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;margin-right:6px}
  .sigrow .sr{font-weight:700}
  .sigrow .sd{font-size:11.5px;color:var(--mute);margin-top:2px}
  .trendleg{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px}
  .trendleg span{display:inline-flex;align-items:center;gap:6px;font-family:'Montserrat',sans-serif;font-weight:700}
  .trendleg i{width:14px;height:3px;border-radius:2px;display:inline-block}
  .pending-line{font-size:11.5px;color:var(--mute);margin-top:12px;font-style:italic;line-height:1.4}

  /* aggressive-selection award badges */
  .awards{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:14px}
  .award{display:inline-flex;align-items:center;gap:10px;font-family:'Montserrat',sans-serif;font-size:12.5px;font-weight:700;letter-spacing:.02em;padding:10px 17px 10px 14px;border-radius:999px;line-height:1.15}
  .award .aw-ic{width:19px;height:19px;flex:0 0 auto}
  .award b{font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .award .aw-win{font-weight:600;opacity:.94;letter-spacing:.01em;text-transform:none;font-size:13px}
  .award.sel{background:linear-gradient(100deg,#b21f2b,#e0402c);color:#fff;box-shadow:0 4px 13px rgba(178,31,43,.26)}
  .award.sel .aw-win{border-left:1px solid rgba(255,255,255,.4);padding-left:10px}
  .award.prix{background:linear-gradient(100deg,#e8b31e,#f4d160);color:#4a3705;box-shadow:0 4px 13px rgba(232,179,30,.3)}
  .award.prix .aw-win{border-left:1px solid rgba(74,55,5,.28);padding-left:10px}
  .award.info{background:#f3f1ea;color:#6b6656;font-weight:600;border:1px solid var(--line2);font-size:12px;padding:9px 15px}
  .award.info b{color:inherit}

  /* Today's Order strip */
  .today-order{margin:0 0 22px}
  .to-inner{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:linear-gradient(100deg,#fffdf6,#f7f5ec);border:1px solid #e8cf8a;border-radius:14px;padding:12px 18px}
  .to-lab{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .to-lab svg{width:16px;height:16px;color:var(--gold-d,#b5850f)}
  .to-seq{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .to-chip{display:inline-flex;align-items:center;gap:7px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line2);border-radius:999px;padding:5px 13px 5px 6px}
  .to-chip i{font-style:normal;width:20px;height:20px;border-radius:50%;background:#3a3a3a;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
  .to-chip.first{background:#fff2cf;border-color:#e0b83c}
  .to-chip.first i{background:var(--gold-d,#c8930b)}
  .to-stage{margin-left:auto;font-size:11px;color:var(--mute);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:0 0 auto}
  @media(max-width:560px){ .to-stage{margin-left:0;flex-basis:100%} }

  /* Palmarès participant cards (Overview) */
  /* in-app refresh button (only shown when launched as the installed app, where there is no URL bar) */
  .refresh-fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));width:50px;height:50px;border-radius:50%;border:none;background:#1c1c1c;color:#f4d160;box-shadow:0 6px 20px rgba(0,0,0,.32);display:none;align-items:center;justify-content:center;cursor:pointer;padding:0;z-index:900}
  .refresh-fab svg{width:23px;height:23px}

  .pb-seat .dot{width:8px;height:8px;border-radius:50%}
  .pb-seat.on{border-color:var(--gold-d);background:#fffaf0}
  .pb-empty{background:var(--card);border:1px dashed var(--line2);border-radius:14px;padding:34px 22px;text-align:center;color:var(--mute);margin:0 0 20px}
  .pb-empty .e-h{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:var(--ink2)}
  .pb-empty .e-b{font-size:13.5px;margin-top:7px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.5}
  .pb-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 22px}
  .pb-stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--sh)}
  .pb-stat .v{font-family:'Montserrat',sans-serif;font-weight:900;font-size:26px;color:var(--ink);line-height:1}
  .pb-stat .k{font-size:11px;color:var(--mute);margin-top:6px;font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .pb-stand{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .pb-board{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--sh)}
  .pb-board .bt{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px}
  .pb-board .bs{font-size:10px;color:var(--mute);margin:2px 0 11px;text-transform:uppercase;letter-spacing:.03em;font-family:'Montserrat',sans-serif;font-weight:700}
  .pb-row{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:9px;margin-top:9px}
  .pb-code{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;color:#fff;border-radius:7px;text-align:center;padding:5px 0}
  .pb-track{height:8px;background:var(--paper2);border-radius:999px;overflow:hidden}
  .pb-fill{height:100%;border-radius:999px;transition:width .3s}
  .pb-val{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;min-width:26px;text-align:right}
  .pb-note{font-size:12px;color:var(--mute);text-align:center;margin:14px 0 0;line-height:1.5}
  @media(max-width:640px){.pb-stats,.pb-stand{grid-template-columns:1fr}}
</style>
</head>

function _nrm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\u00e6/g,'ae').replace(/\u00f8/g,'o').replace(/\u00df/g,'ss').replace(/\u0142/g,'l');}
const init=r=>r.replace(/[^A-Za-z. ]/g,'').split(/[.\s]+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);
function boot(t){ $('boot').textContent=t||''; $('boot').style.display=t?'block':'none'; }

let me=null, myEmail=null, isOwner=false, poolId=null, pool=null, STAGE=null, ORDER=[], SNAKE=[], PMETA={}, JUDGE=null;
let myCode=null, isJudge=false, draft=null, unsub=null, chosen=null;
const paramPool=new URLSearchParams(location.search).get('pool');

const EMPTY={
  ledger:['Stage ledger','Every stage\'s picks and finishes will land here as the race is scored.'],
  stats:['Stats and notes','Trends, signature riders, and the number-crunching show up once you have scored stages.'],
  teams:['Allegiances','The teams your picks belong to tally here the moment the first round of picks is in.'],
  hits:['Hits and misses','Your best calls and the ones that got away, filled in stage by stage.'],
  results:['Full results','The complete finish-by-finish record builds here as stages are scored.']
};

auth.onAuthStateChanged(async user=>{
  if(!user){ $('board').style.display='none'; $('gate').style.display='block'; boot(''); return; }
  me=user; myEmail=(user.email||'').toLowerCase(); isOwner=(myEmail===OWNER_EMAIL);
  $('gate').style.display='none';
  boot('Finding your pool...');
  try{
    const id=await resolvePool();
    if(!id) return;
    await loadPool(id);
    if(myCode){ db.doc('userPools/'+myEmail).set({pools:FV.arrayUnion(poolId)},{merge:true}).catch(function(){}); }
    showBoard();
    subscribe();
  }catch(e){ boot('Error: '+(e.message||e)); }
});
$('gbtn').addEventListener('click',()=>{
  const p=new firebase.auth.GoogleAuthProvider(); p.setCustomParameters({prompt:'select_account'});
  auth.signInWithPopup(p).catch(e=>{ $('gmsg').textContent=e.message; $('gmsg').className='gmsg err'; });
});

async function resolvePool(){
  if(paramPool) return paramPool;
  if(isOwner){
    const all=await db.collection('pools').get();
    const rows=[]; all.forEach(d=>rows.push({id:d.id,name:(d.data().name||d.id)}));
    if(rows.length===0){ boot('No pools yet. Create one in the operator console.'); return null; }
    if(rows.length===1) return rows[0].id;
    boot(''); $('board').style.display='none'; $('gate').style.display='block';
    $('gmsg').innerHTML='Operator: '+rows.map(r=>`<a href="?pool=${encodeURIComponent(r.id)}">${esc(r.name)}</a>`).join(' &middot; ');
    return null;
  }
  const idx=await db.doc('userPools/'+myEmail).get();
  const ids=idx.exists?(idx.data().pools||[]):[];
  const got=[];
  for(const id of ids){ try{ const s=await db.doc('pools/'+id).get(); if(s.exists) got.push(id); }catch(e){} }
  if(got.length>=1) return got[0];
  boot(''); $('gate').style.display='block';
  $('gmsg').textContent='You are not in a pool yet. Ask Allen to add you, then sign in again.';
  return null;
}

async function loadPool(id){
  const snap=await db.doc('pools/'+id).get();
  if(!snap.exists) throw new Error('That pool does not exist.');
  poolId=id; pool=snap.data();
  STAGE=String(pool.startStage);
  ORDER=(pool.order&&pool.order.length)?pool.order.slice():Object.values(pool.members||{});
  SNAKE=ORDER.concat(ORDER.slice().reverse());
  JUDGE=pool.judge||null;
  PMETA={}; ORDER.forEach((c,i)=>{ PMETA[c]={n:c,c:PALETTE[i%PALETTE.length]}; });
  myCode=(pool.members||{})[myEmail]||null;
  isJudge=(myCode&&myCode===JUDGE);
}

function showBoard(){
  boot(''); $('board').style.display='block';
  // masthead title + subline reflect the pool
  const h=document.querySelector('#board .mast-t .s'); if(h) h.textContent=(pool.name||'Fantasy pool')+' - Cycling';
  const hero=$('heroLead'); if(hero) hero.textContent='';
  // today's order strip
  const seats=ORDER.map((c,i)=>`<span class="pb-seat" data-code="${c}"><span class="dot" style="background:${PMETA[c].c}"></span>${c}</span>`).join('');
  $('pbOrder').innerHTML=`<span class="lb">Draft order</span>${seats}`;
  // palmares cards + live standings board (zeros until stages are scored)
  loadScore().then(r=>{ renderPalmares(r); renderScore(r); }).catch(()=>{});
  // other tabs empty states
  document.querySelectorAll('.pb-empty[data-empty]').forEach(el=>{ const k=el.dataset.empty; if(EMPTY[k]) el.innerHTML=`<div class="e-h">${esc(EMPTY[k][0])}</div><div class="e-b">${esc(EMPTY[k][1])}</div>`; });
  // tab switching
  document.querySelectorAll('nav.tabs button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('section.tab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); $('tab-'+b.dataset.tab).classList.add('on');
  }));
}

/* ---------------- palmares cards (your exact card, empty until scored) ---------------- */
const jerseySVG='<svg viewBox="0 0 48 48" class="pc-jersey" aria-hidden="true"><path d="M17 8l-8 4-4 9 5 3 2-3v16h24V21l2 3 5-3-4-9-8-4-4 4-4 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M20 8a4 4 0 008 0" fill="none" stroke="currentColor" stroke-width="2"/></svg>';
const selIC='<svg viewBox="0 0 24 24" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6"/><path d="M18 18L6 6"/><path d="M4.5 15.5L8 19"/><path d="M19.5 15.5L16 19"/></g><g fill="currentColor"><circle cx="5" cy="20" r="1.4"/><circle cx="19" cy="20" r="1.4"/></g></svg>';
const prixIC='<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 5.4l1.5 3 3.3.5-2.4 2.3.6 3.3-3-1.6-3 1.6.6-3.3-2.4-2.3 3.3-.5z"/><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 19q-4.2-3.8-3.2-9.6"/><path d="M15 19q4.2-3.8 3.2-9.6"/></g></svg>';
const winIC='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v3h4v3a5 5 0 01-5 5h-.4A5 5 0 0113 16.9V19h3v2H8v-2h3v-2.1A5 5 0 019.4 14H9a5 5 0 01-5-5V6h3zM7 8H6v1a3 3 0 002 2.8zM18 8v3.8A3 3 0 0020 9V8z" fill="currentColor"/></svg>';
function ordinal(n){ if(!n) return '-'; const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function nameFor(code){ return ((pool.names||{})[code])||''; }
function renderPalmares(r){
  const el=$('pbPalmares'); if(!el) return;
  const scored=r.completed.length;
  const order = scored ? [...ORDER].sort((a,b)=>(r.place[a]||0)-(r.place[b]||0)) : ORDER.slice();
  const rankOrder = scored ? [...ORDER].sort((a,b)=>(r.rank[a]||0)-(r.rank[b]||0)) : ORDER.slice();
  el.innerHTML = order.map((k,i)=>{
    const lead = scored && i===0;
    const placePos = scored ? i+1 : 0;
    const rankPos = scored ? rankOrder.indexOf(k)+1 : 0;
    const nm = nameFor(k);
    return `<div class="pcard${lead?' lead':''}">
      <div class="pc-top">
        <div class="pc-av empty">${jerseySVG}</div>
        <div class="pc-id">
          <div class="pc-code">${k}${lead?'<span class="pc-crown">'+winIC+'</span>':''}</div>
          ${nm?`<div class="pc-name">${esc(nm)}</div>`:''}
          <div class="pc-persona ph">persona to come</div>
        </div>
      </div>
      <div class="pc-standings">
        <span class="pc-stat"><em>${ordinal(placePos)}</em><span class="pl-lab">Placement</span><b>${r.place[k]||0}</b></span>
        <span class="pc-stat"><em>${ordinal(rankPos)}</em><span class="pl-lab">Rank</span><b>${r.rank[k]||0}</b></span>
      </div>
      <div class="pc-medals">
        <span class="medal sel zero">${selIC}<b>0</b><span>Selection</span></span>
        <span class="medal prix zero">${prixIC}<b>0</b><span>Prix</span></span>
        <span class="medal win zero">${winIC}<b>0</b><span>Wins</span></span>
      </div>
    </div>`;
  }).join('');
}

/* ---------------- scoring (same engine, verified) ---------------- */
const SC_PT={1:25,2:20,3:16,4:13,5:11,6:10,7:9,8:8,9:7,10:6,11:5,12:4,13:3,14:2,15:1};
function pointsFor(f){ return SC_PT[f]||0; }
function computeStandings(data){
  const players=data.players.slice(), voidSet={}; (data.void||[]).forEach(n=>voidSet[String(n)]=1);
  const place={},rank={},points={}; players.forEach(p=>{place[p]=0;rank[p]=0;points[p]=0;});
  const nos=Object.keys(data.stages).map(Number).sort((a,b)=>a-b); const completed=[];
  nos.forEach(n=>{ if(voidSet[String(n)]) return; const st=data.stages[String(n)];
    const has=players.some(p=>(st[p]||[]).some(pr=>pr[1]!=null)); if(!has) return; completed.push(n);
    players.forEach(p=>(st[p]||[]).forEach(pr=>{ if(pr[1]!=null){ place[p]+=pr[1]; points[p]+=pointsFor(pr[1]); }}));
    const allp=[]; players.forEach(p=>(st[p]||[]).forEach(pr=>{ if(pr[1]!=null) allp.push({fin:pr[1],p}); }));
    allp.sort((a,b)=>a.fin-b.fin); let seen=0,rk=0,prev=null;
    allp.forEach(row=>{ seen++; if(prev===null||row.fin>prev) rk=seen; rank[row.p]+=rk; prev=row.fin; });
  });
  return {completed,place,rank,points};
}
async function loadScore(){
  let stages={};
  try{ const snap=await db.collection('pools/'+poolId+'/stages').get(); snap.forEach(d=>{ stages[d.id]=(d.data().picks)||{}; }); }catch(e){}
  return computeStandings({players:ORDER, void:(pool.void||[]), stages});
}
function board(title,sub,map,low){
  const entries=ORDER.map(c=>[c,map[c]||0]); entries.sort((a,b)=>low?a[1]-b[1]:b[1]-a[1]);
  const max=Math.max(1,...entries.map(e=>e[1]));
  const rows=entries.map(e=>{ const w=e[1]?Math.max(6,Math.round(e[1]/max*100)):0;
    return `<div class="pb-row"><span class="pb-code" style="background:${PMETA[e[0]].c}">${e[0]}</span><span class="pb-track"><span class="pb-fill" style="width:${w}%;background:${PMETA[e[0]].c}"></span></span><span class="pb-val">${e[1]}</span></div>`; }).join('');
  return `<div class="pb-board"><div class="bt">${esc(title)}</div><div class="bs">${sub}</div>${rows}</div>`;
}
function renderScore(r){
  const scored=r.completed.length;
  $('pbStandings').innerHTML =
    board('Placement','sum of finishes · low leads', r.place, true)+
    board('Rank','picks ranked · low leads', r.rank, true)+
    board('Fantasy Points','top-15 scale · high leads', r.points, false);
  $('pbStandNote').textContent = scored
    ? '' : `Everyone starts level. The board fills the moment Stage ${STAGE} is scored.`;
}

/* ---------------- draft engine (per pool) ---------------- */
function draftRef(){ return db.doc('pools/'+poolId+'/drafts/'+STAGE); }
function draftInit(){ return { n:Number(STAGE), order:ORDER, snake:SNAKE, queue:SNAKE.slice(), picks:[], status:'pending', createdAt:FV.serverTimestamp() }; }
function subscribe(){
  if(unsub) unsub();
  unsub=draftRef().onSnapshot(async snap=>{
    if(!snap.exists){ if(isOwner||myCode){ try{ await draftRef().set(draftInit()); }catch(e){ $('draftMount').innerHTML=warn('Could not open the draft: '+esc(e.message)); } return; } $('draftMount').innerHTML='<div class="draft"><div class="allin"><div class="sm">The draft has not been opened yet.</div></div></div>'; return; }
    draft=snap.data();
    if(draft.status==='pending'&&(draft.picks||[]).length===0&&JSON.stringify(draft.order||[])!==JSON.stringify(ORDER)){ if(isOwner||myCode){ try{ await draftRef().set(draftInit()); }catch(e){} return; } }
    renderDraft();
    highlightSeat();
  }, err=>{ $('draftMount').innerHTML=warn('Permission error: '+esc(err.message)); });
}
function warn(t){ return '<div class="draft"><div class="allin"><div class="sm" style="color:var(--red)">'+t+'</div></div></div>'; }
function highlightSeat(){ const clock=(draft&&draft.queue&&draft.queue[0])||null; document.querySelectorAll('.pb-seat').forEach(s=>s.classList.toggle('on', s.dataset.code===clock)); }
function head(sub,badge){ return `<div class="dh"><div class="dh-l"><div class="dh-ico"><svg viewBox="0 0 40 40" fill="none"><path d="M4 31 L15 13 L21 22 L27 9 L36 31 Z" fill="#e8b31e"/><circle cx="27" cy="9" r="3.2" fill="#e8b31e"/></svg></div><div><div class="dh-t">Stage ${esc(STAGE)} draft</div><div class="dh-s">${sub}</div></div></div>${badge||''}</div>`; }
function riderAv(rider,pending,clock,player){ if(pending) return `<span class="tav pending ${clock?'clock':''}"><span class="fb" style="color:${PMETA[player].c}">${player}</span></span>`; const col=rider.c||'#888'; const fb=`<span class="fb" style="background:${col}">${init(rider.r)}</span>`; const img=rider.p?`<img class="ph" src="${esc(rider.p)}" onerror="this.remove()">`:''; return `<span class="tav" style="box-shadow:0 0 0 2.5px ${col}">${fb}${img}</span>`; }
function renderDraft(){
  const picks=draft.picks||[], queue=draft.queue||[]; const clock=queue[0]||null; const status=draft.status||'pending';
  const done=status==='complete'||queue.length===0; const pending=status==='pending'&&picks.length===0; const leadoff=ORDER[0];
  let nodes='';
  for(let i=0;i<SNAKE.length;i++){ if(i===ORDER.length) nodes+='<div class="tgap"></div>';
    if(i<picks.length){ const pk=picks[i]; nodes+=`<div class="tnode">${riderAv({r:pk.rider,c:pk.color||'#888',p:pk.photo},false)}<div class="tcap"><b style="color:${PMETA[pk.player].c}">#${i+1}</b>${pk.player}</div><div class="tname">${esc(pk.rider)}</div></div>`; }
    else { const qi=i-picks.length, player=queue[qi], clk=(qi===0&&!pending); nodes+=`<div class="tnode">${riderAv(null,true,clk,player)}<div class="tcap"><b style="color:${PMETA[player].c}">#${i+1}</b>${player}</div></div>`; } }
  let badge = pending?'<span class="dh-badge badge-pending">Not started</span>':(done?`<span class="dh-badge badge-done">All ${picks.length} in</span>`:`<span class="dh-badge badge-clock">${PMETA[clock].n} on the clock</span>`);
  const sub = pending?`Snake draft · opens on ${PMETA[leadoff].n}'s first pick`:(done?'Snake draft · complete':'Snake draft · live');
  let action='';
  if(done){ action=`<div class="action"><div class="allin"><div class="big">All picks are in.</div><div class="sm">Standings post once the stage is scored.</div></div></div>`; }
  else if(pending){ if(clock===myCode){ action=`<div class="action"><div class="a-h">You lead off · pick #1<small>Locking your first rider opens the draft for everyone.</small></div>${searchRow('Launch the draft')}</div>`; } else { action=`<div class="action"><div class="pendline"><b>The draft opens when ${PMETA[leadoff].n} makes the first pick.</b> Your turn shows here the moment it is live.</div></div>`; } }
  else if(clock===myCode){ action=`<div class="action"><div class="a-h">You are on the clock · pick #${picks.length+1}</div>${searchRow('Lock pick')}</div>`; }
  else { const mine=[]; queue.forEach((c,idx)=>{ if(c===myCode) mine.push(idx); }); const nextTxt=myCode?(mine.length?`Your next turn is pick #${picks.length+mine[0]+1}.`:'Both your picks are in.'):'You are watching.'; action=`<div class="action"><div class="waitline"><b>${PMETA[clock].n} is on the clock.</b> ${nextTxt}</div></div>`; }
  let admin=''; if(isOwner&&!pending&&clock&&clock!==myCode){ admin=`<div class="admin"><div class="ad-h">Operator · enter for the player on the clock</div><div class="ad-b">${PMETA[clock].n} is up (pick #${picks.length+1}).</div>${searchRow('Enter for '+PMETA[clock].n)}</div>`; }
  let judge=''; if(isJudge&&!pending&&clock&&clock!==myCode){ judge=`<div class="judge"><div class="j-h">Judge control</div><div class="j-b">Waiting on <b>${PMETA[clock].n}</b> (pick #${picks.length+1}).</div><button class="j-skip" id="bump" type="button">Bump ${PMETA[clock].n} to the back</button></div>`; }
  $('draftMount').innerHTML='<div class="draft">'+head(sub,badge)+`<div class="ticker">${nodes}</div>`+action+admin+judge+'</div>';
  let forCode=null; if((pending||!pending)&&clock===myCode) forCode=myCode; else if(isOwner&&!pending&&clock&&clock!==myCode) forCode=clock;
  if(forCode) wireSearch(forCode);
  const b=$('bump'); if(b) b.addEventListener('click',doBump);
}
function searchRow(label){ return `<div class="searchrow"><input id="s" placeholder="Search a rider still on the board..." autocomplete="off"><button class="lockbtn" id="lock" disabled>${esc(label)}</button><div class="ac" id="ac"></div></div>`; }
function wireSearch(forCode){ const input=$('s'),ac=$('ac'),lock=$('lock'); if(!input) return; const taken=new Set((draft.picks||[]).map(p=>p.rider)); chosen=null; const label=lock.textContent;
  input.addEventListener('input',()=>{ chosen=null; lock.disabled=true; const q=input.value.trim().toLowerCase(); if(!q){ac.classList.remove('open');return;} const ms=RIDERS.filter(r=>!r.x&&!taken.has(r.r)&&(_nrm(r.r).includes(_nrm(q))||_nrm(r.n||'').includes(_nrm(q))||_nrm(r.t).includes(_nrm(q)))).slice(0,8); ac.innerHTML=ms.length?ms.map((r,i)=>`<div class="ac-item" data-i="${i}"><img class="ac-av" src="${esc(r.p||'')}" onerror="this.style.visibility='hidden'"><span class="ac-rn">${esc(r.r)}</span><span class="ac-rt">${esc(r.t)}</span></div>`).join(''):'<div class="ac-item" style="color:var(--mute)">No match (35 riders now; full field next)</div>'; ac.classList.add('open'); ac.querySelectorAll('.ac-item[data-i]').forEach(it=>it.addEventListener('mousedown',e=>{e.preventDefault();chosen=ms[+it.dataset.i];input.value=chosen.r+'  ('+chosen.t+')';ac.classList.remove('open');lock.disabled=false;})); });
  input.addEventListener('blur',()=>setTimeout(()=>ac.classList.remove('open'),150)); lock.addEventListener('click',()=>submitPick(forCode,label)); }
async function submitPick(forCode,label){ if(!chosen) return; const code=forCode||myCode; const lock=$('lock'); if(lock){lock.disabled=true;lock.textContent='Saving...';} const ref=draftRef(); const picked=chosen;
  try{ await db.runTransaction(async tx=>{ const d=(await tx.get(ref)).data(); if(d.status==='complete') throw new Error('draft closed'); if(d.queue[0]!==code) throw new Error('not your turn'); if((d.picks||[]).some(p=>p.rider===picked.r)) throw new Error('already taken'); const pick={n:(d.picks||[]).length+1,player:code,rider:picked.r,team:picked.t,photo:picked.p||'',color:picked.c||'',by:myEmail,admin:code!==myCode}; const queue=d.queue.slice(1); tx.update(ref,{picks:(d.picks||[]).concat([pick]),queue,status:queue.length?'live':'complete'}); }); }
  catch(e){ alert('Could not lock pick: '+(e.message||e)); const l=$('lock'); if(l){l.disabled=false;l.textContent=label||'Lock pick';} } }
async function doBump(){ const ref=draftRef(); try{ await db.runTransaction(async tx=>{ const d=(await tx.get(ref)).data(); if(!d.queue.length) return; const q=d.queue.slice(); q.push(q.shift()); tx.update(ref,{queue:q,bumpedAt:FV.serverTimestamp()}); }); }catch(e){ alert('Bump failed: '+(e.message||e)); } }
boot('Connecting...');
</script>
